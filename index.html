    icons.forEach((_, i) => {
        let j = Math.floor(Math.random() * (i + 1));
        [icons[i], icons[j]] = [icons[j], icons[i]];
    });

    const bg = document.getElementById("bg");

    const rows = 10;
    const cols = 10;
    const cellW = 1000 / cols;
    const cellH = 1000 / rows;

    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            const pathData = icons[(r * cols + c) % icons.length];

            let y = r * cellH + cellH / 2;

            y += (Math.random() - 0.5) * cellH * 0;

            const scale = 0.5 + Math.random() * 0.03;

            const rot = Math.random() * 360;

            p.setAttribute("transform", `translate(${x},${y}) scale(${scale}) rotate(${rot})`);
            bg.appendChild(p);
